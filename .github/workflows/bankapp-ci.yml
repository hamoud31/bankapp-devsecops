name: bankapp-devsecops-pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # -----------------------------
  # 1) Compile Stage
  # -----------------------------
  compile_project:
    name: compile
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bankapp

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Compile project
        run: mvn -B compile

      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: compiled-classes
          path: bankapp/target/classes

  # -----------------------------
  # 2) Unit Test Stage
  # -----------------------------
  test_project:
    name: unit_tests
    runs-on: ubuntu-latest
    needs: compile_project

    defaults:
      run:
        working-directory: bankapp

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run unit tests
        run: mvn -B test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: bankapp/target/surefire-reports

  # -----------------------------
  # 3) Build JAR Stage
  # -----------------------------
  build_project:
    name: build_project
    runs-on: ubuntu-latest
    needs: test_project

    defaults:
      run:
        working-directory: bankapp

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Package JAR
        run: mvn -B package -DskipTests

      - name: Upload final JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: bankapp-jar
          path: bankapp/target/*.jar
