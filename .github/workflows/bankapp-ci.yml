name: bankapp-devops

on:
  push:
    branches: ["main", "develop"]

  pull_request:
    branches: ["main", "develop"]

jobs:

  compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bankapp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Compile code
        run: mvn compile

  tests:
    runs-on: ubuntu-latest
    needs: compile
    defaults:
      run:
        working-directory: bankapp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Run tests
        run: mvn test

  trivy_scan:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: ./bankapp
          severity: HIGH,CRITICAL
          exit-code: 0
