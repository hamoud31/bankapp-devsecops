name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ---------------------------------------------------------
  # 1. Build + Test
  # ---------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build with Maven
        run: mvn -B clean package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bankapp-target
          path: target

  # ---------------------------------------------------------
  # 2. Trivy Filesystem Scan
  # ---------------------------------------------------------
  trivy_fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: bankapp-target
          path: ./bankapp/target

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./bankapp
          format: table
          exit-code: 0

  # ---------------------------------------------------------
  # 3. SonarQube Analysis + Quality Gate
  # ---------------------------------------------------------
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: trivy_fs

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: bankapp-target
          path: ./bankapp/target

      - run: ls -R bankapp/target

      # --- Sonar Scan ---
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectBaseDir=bankapp
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # --- Quality Gate ---
      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@v2
        with:
          scanMetadataReportFile: bankapp/.scannerwork/report-task.txt
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Show Quality Gate Status
        run: echo "Quality Gate: ${{ steps.sonarqube-quality-gate-check.outputs.quality-gate-status }}"

  # ---------------------------------------------------------
  # 4. Deployment (Optional Placeholder)
  # ---------------------------------------------------------
  deploy:
    name: Deploy (Optional)
    runs-on: ubuntu-latest
    needs: sonarqube
    if: ${{ steps.sonarqube-quality-gate-check.outputs.quality-gate-status == 'PASSED' }}

    steps:
      - run: echo "Deploying BankApp..."
