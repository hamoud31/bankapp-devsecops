name: bankapp-devops-ci

on:
  push:
    branches: ["main", "develop"]

env:
  APP_NAME: bankapp

jobs:

  # ---------------------------------------------------------
  # 1️⃣ Pre-Build & Unit Tests
  # ---------------------------------------------------------
  pre_build:
    name: Pre Build & Test
    runs-on: ubuntu-latest
    env:
      STAGE_NAME: before_package
    defaults:
      run:
        working-directory: bankapp
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run Unit Tests
        run: |
          mvn test
          echo "App Name: $APP_NAME"
          echo "Stage Name: $STAGE_NAME"

  # ---------------------------------------------------------
  # 2️⃣ Build Package
  # ---------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: pre_build
    defaults:
      run:
        working-directory: bankapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: |
          mvn package
          echo "App Name: $APP_NAME"
          echo "Stage Name: build"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bankapp-target
          path: target

  # ---------------------------------------------------------
  # 3️⃣ Trivy Filesystem Scan
  # ---------------------------------------------------------
  trivy_scan:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: ./bankapp
          severity: HIGH,CRITICAL
          exit-code: 0

  # ---------------------------------------------------------
  # 4️⃣ SonarQube Analysis & Quality Gate
  # ---------------------------------------------------------
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: trivy_scan
    defaults:
      run:
        working-directory: bankapp
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: bankapp-target
          path: target

      - name: List build artifacts
        run: ls -R target

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectBaseDir=.
            -Dsonar.qualitygate.wait=true

      - name: SonarQube Quality Gate check
        id: quality_gate
        uses: sonarsource/sonarqube-quality-gate-action@v2
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Show Quality Gate Status
        run: echo "Quality Gate Status: ${{ steps.quality_gate.outputs.quality-gate-status }}"

  # ---------------------------------------------------------
  # 5️⃣ Optional Deploy (conditional on Quality Gate)
  # ---------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: sonarqube
    if: needs.sonarqube.outputs.quality_gate == 'PASSED'
    steps:
      - run: echo "Deploying $APP_NAME..."
