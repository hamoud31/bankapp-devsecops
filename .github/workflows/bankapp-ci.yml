name: bankapp-devops
on: 
  push:
    branches: [ "main", "develop" ]

  pull_request:
    branches: [ "main", "develop" ]

  jobs:
  compile:
    runs-on: ubuntu-latest
    defaults:
      workdir: bankapp
      steps:
      - name : chekout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: compile code
        run: mvn compile
  
  tests: 
    runs-on: ubuntu-latest
    needs: compile
    defaults:
      workdir: bankapp
      steps:
      - name : chekout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: run tests
        run: mvn test
  trivy_scan:
    runs-on: ubuntu-latest
    needs: tests
    defaults:
      workdir: bankapp
      steps:
      - name : chekout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: run trivy scan
        run: trivy fs --exit-code 1 --severity HIGH,CRITICAL . || true
