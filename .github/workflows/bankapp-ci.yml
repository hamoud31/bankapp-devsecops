name: bankapp-devops-ci
on:
  push:
    branches: ["main", "develop"]

env:
  APP_NAME: bankapp

jobs:

  # ---------------------------------------------------------
  # 1️⃣ Pre-Build & Unit Tests
  # ---------------------------------------------------------
  pre_build:
    name: Pre Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bankapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run Unit Tests
        run: mvn test

  # ---------------------------------------------------------
  # 2️⃣ Build Package
  # ---------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: pre_build
    defaults:
      run:
        working-directory: bankapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -B package

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bankapp-target
          path: target   # Upload ONLY target/, not the whole repo

  # ---------------------------------------------------------
  # 3️⃣ Trivy Filesystem Scan
  # ---------------------------------------------------------
  trivy_scan:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: ./bankapp
          severity: HIGH,CRITICAL
          exit-code: 0

  # ---------------------------------------------------------
  # 4️⃣ SonarQube Analysis & Quality Gate
  # ---------------------------------------------------------
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: trivy_scan
    outputs:
      quality_gate: ${{ steps.quality_gate.outputs.quality-gate-status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: bankapp-target
          path: bankapp   # Download into bankapp/

      - name: Unzip artifact
        run: |
          cd bankapp
          unzip bankapp-target.zip -d .

      - name: Debug artifact contents
        run: ls -R bankapp/target

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectBaseDir=bankapp
            -Dsonar.qualitygate.wait=true

      - name: SonarQube Quality Gate check
        id: quality_gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          scanMetadataReportFile: bankapp/.scannerwork/report-task.txt
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
