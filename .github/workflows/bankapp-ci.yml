name: bankapp-devsecops-pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: bankapp-pipeline
  cancel-in-progress: true

jobs:

  # 1️⃣ Compile
  compile:
    name: Compile
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bankapp

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Compile
        run: mvn -B compile

      - name: Package
        run: mvn -B package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bankapp-target
          path: bankapp/target/*.jar

  # 2️⃣ Test
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: compile

    defaults:
      run:
        working-directory: bankapp

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run tests
        run: mvn test


 

  # 4️⃣ Trivy File System Scan
  trivy_fs:
    name: Trivy File System Scan
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: bankapp

    steps:
      - uses: actions/checkout@v4

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1


  # 5️⃣ SonarQube Analysis (with artifact download)
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: trivy_fs

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # recommended for PR decoration

      - name: Download compiled artifact
        uses: actions/download-artifact@v4
        with:
          name: bankapp-target
          path: ./artifact

      - name: Extract compiled classes for SonarQube
        run: |
          mkdir -p target
          cd target
          jar -xf ../artifact/*.jar
          cd ..

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          
      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
